name: Build and push image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Smoke test: build the image and actually run it against a throwaway Postgres.
  # Catches startup failures (e.g. `migrate deploy` missing a module) before we
  # ever publish — the kind of error that otherwise only shows up on the device.
  smoke-test:
    runs-on: ubuntu-24.04-arm
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: picpan:test
          cache-from: type=gha

      - name: Run container and assert it boots past migrations
        run: |
          docker run -d --name picpan-test --network host \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e NEXTAUTH_SECRET=ci-test-secret \
            -e NEXTAUTH_URL=http://localhost:3000 \
            picpan:test

          # entrypoint runs `migrate deploy` then `Starting server...`.
          # If migrations fail, the container exits non-zero and we never see it.
          for i in $(seq 1 30); do
            if docker logs picpan-test 2>&1 | grep -q "Starting server"; then
              echo "✅ Migrations applied and server started"
              docker logs picpan-test
              exit 0
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' picpan-test)" != "true" ]; then
              echo "❌ Container exited before starting the server:"
              docker logs picpan-test
              exit 1
            fi
            sleep 2
          done
          echo "❌ Timed out waiting for server to start:"
          docker logs picpan-test
          exit 1

  build:
    needs: smoke-test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
